name = "snaky-screen-share"
main = "src/index.js"
compatibility_date = "2024-01-01"

# KV 네임스페이스 바인딩
[[kv_namespaces]]
binding = "ACTIVE_SESSIONS"
id = "YOUR_KV_ID_HERE"

[durable_objects]
bindings = [
  { name = "ROOM", class_name = "ScreenShareRoom" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ScreenShareRoom"]

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
